poi:
  - name: poi_goal_only
    pose: {x: 1.0, y: 0.0, yaw: 0.0}
    tolerance: {xy: 0.5, yaw: 0.785}
    tags: [waypoint]
    description: "goalタグのみ"
  - name: poi_with_pause
    pose: {x: 0.0, y: 2.0, yaw: 0.0}
    tolerance: {xy: 0.5, yaw: 0.785}
    tags: [waypoint, pause]
    description: "pauseタグ付き"
  - name: poi_with_custom
    pose: {x: 3.0, y: 0.0, yaw: 0.0}
    tolerance: {xy: 0.5, yaw: 0.785}
    tags: [waypoint, audio_info]
    description: "custom_tag付き"
  - name: poi_pause_and_custom
    pose: {x: 0.0, y: 4.0, yaw: 0.0}
    tolerance: {xy: 0.5, yaw: 0.785}
    tags: [waypoint, pause, audio_info]
    description: "pause + custom_tag"
  # landmark コントラスト test 用 (#236 medium #5)。route.landmarks 列挙の有無で
  # ENTER 発火が変わることを pin する。landmark tag は waypoint/pause と排他 (#143)。
  - name: poi_landmark_listed
    pose: {x: -3.0, y: 0.0, yaw: 0.0}
    tolerance: {xy: 0.5, yaw: 0.785}
    tags: [landmark, audio_info]
    description: "route.landmarks に列挙される landmark"
  - name: poi_landmark_unlisted
    pose: {x: -5.0, y: 0.0, yaw: 0.0}
    tolerance: {xy: 0.5, yaw: 0.785}
    tags: [landmark]
    description: "landmark tag を持つが route に列挙されない (ENTER 発火しないことの対照)"

custom_tags:
  - {name: audio_info, description: "Audio guide trigger"}

route:
  # route_a: ROUTE-mode integration test 用。pause POI を 2 つ (poi_with_pause /
  # poi_pause_and_custom) 含み、連続 pause の各 POI 発火 (#236 medium #4) も pin する。
  - name: route_a
    waypoints: [poi_goal_only, poi_with_pause, poi_with_custom, poi_pause_and_custom]
  # route_landmark: route.landmarks 列挙対象のみ radius 監視されることの test 用 (#236 medium #5)。
  # poi_landmark_unlisted は landmark tag を持つが列挙しないので監視対象外。
  - name: route_landmark
    waypoints: [poi_goal_only]
    landmarks: [poi_landmark_listed]
