# System tags: システムが動作に使用。削除・リネーム非推奨。
# User tags は各 mapoi_config.yaml の custom_tags セクションで定義してください。

tags:
  - name: waypoint
    description: "Nav2 navigation target (single goal or route waypoint)"
  - name: landmark
    description: "Reference point on the map (excluded from Nav2 navigation target)"
  - name: pause
    description: "Automatically pause navigation when robot enters the POI radius"
  - name: initial_pose
    description: "Initial pose for localization (e.g. AMCL); auto-published on map load/switch"
