# mapoi bringup: core 3 nodes + (任意で) シミュレータ連動 bridge を 1 本で起動。
#
# 自分のロボットに mapoi を組み込む場合はこの launch を include する想定:
#
#   - include:
#       file: "$(find-pkg-share mapoi_server)/launch/mapoi_bringup.launch.yaml"
#       arg:
#         - {name: maps_path,  value: "/path/to/maps"}
#         - {name: map_name,   value: "initial_map_name"}
#         - {name: simulator,  value: "gazebo"}              # gazebo|gz|none
#         - {name: robot_entity_name, value: "burger"}       # simulator=gazebo|gz のみ
#         - {name: robot_sdf_path,    value: "/path/.../model.sdf"}
#
# 設計メモ: シミュレータ bridge は別 launch ファイルにせず本 launch 内に直接 node 定義した。
# 理由: bridge は mapoi_server の publish に依存するため単体起動の意味がなく、
# 別 launch にしても include 1 行で済むだけで再利用性が無いため。

launch:

- arg:
    name: maps_path
    description: "Full path to maps directory (REQUIRED)"

- arg:
    name: map_name
    description: "Initial map name, which is a directory name inside maps_path (REQUIRED)"

- arg:
    name: config_file
    default: "mapoi_config.yaml"
    description: "Config file name inside each map directory"

- arg:
    name: simulator
    default: "none"
    description: >
      シミュレータ選択:
        gazebo = Gazebo Classic (Humble 想定、mapoi_gazebo_bridge を起動)
        gz     = gz-sim (Jazzy 想定、mapoi_gz_bridge + parameter_bridge を起動)
        none   = シミュレータ連動なし (実機)

- arg:
    name: robot_entity_name
    default: ""
    description: "シミュレータ内のロボット entity 名 (simulator=gazebo|gz のときのみ使用)"

- arg:
    name: robot_sdf_path
    default: ""
    description: >
      ロボット再生成用 SDF ファイルのフルパス (simulator=gazebo のときのみ使用)。
      空文字なら respawn はスキップ (warn のみ)。
      simulator=gz では SetEntityPose で teleport するため SDF 不要。

- arg:
    name: init_world_name
    default: "default"
    description: >
      gz-sim で起動済みの world 名 (起動時固定、bridge ライフタイム中は不変)。
      mapoi_gz_bridge は /world/<init_world_name>/{create,remove,set_pose} サービスを
      呼ぶため、gz_sim 起動時の world 名 (SDF の <world name="..."> 値) と一致する必要がある。
      simulator=gz のときのみ使用。

- arg:
    name: with_nav_server
    default: "true"
    description: >
      mapoi_nav_server を起動するか。Nav2 連携が不要な構成 (POI/Route 編集のみの editor 用途等) で false。

- arg:
    name: with_rviz_publisher
    default: "true"
    description: >
      mapoi_rviz2_publisher を起動するか。RViz を使わない構成 (WebUI のみ、headless 編集等) で false。

# core 3 nodes (常時起動)
- node:
    pkg: mapoi_server
    exec: mapoi_server
    param:
      - {name: maps_path, value: "$(var maps_path)"}
      - {name: map_name, value: "$(var map_name)"}
      - {name: config_file, value: "$(var config_file)"}

- node:
    pkg: mapoi_server
    exec: mapoi_nav_server
    if: $(var with_nav_server)

- node:
    pkg: mapoi_server
    exec: mapoi_rviz2_publisher
    if: $(var with_rviz_publisher)

# Gazebo Classic 連動 (Humble): operator map switch 時に world_model entity を入れ替え +
# ロボットを initial_pose POI 座標に再生成 (Gazebo 本体は無停止)。
- node:
    pkg: mapoi_server
    exec: mapoi_gazebo_bridge
    output: "screen"
    param:
      - {name: robot_entity_name, value: "$(var robot_entity_name)"}
      - {name: robot_sdf_path, value: "$(var robot_sdf_path)"}
    if: $(eval "'$(var simulator)' == 'gazebo'")

# gz-sim 連動 (Jazzy): operator map switch 時に world_model entity を入れ替え +
# ロボットを SetEntityPose で initial_pose POI 座標に teleport (gz-sim 本体は無停止)。
# parameter_bridge で gz native service (gz transport) を ROS 2 service として bridge する。
- node:
    pkg: mapoi_server
    exec: mapoi_gz_bridge
    output: "screen"
    param:
      - {name: robot_entity_name, value: "$(var robot_entity_name)"}
      - {name: init_world_name, value: "$(var init_world_name)"}
    if: $(eval "'$(var simulator)' == 'gz'")

- node:
    pkg: ros_gz_bridge
    exec: parameter_bridge
    output: "screen"
    args: "/world/$(var init_world_name)/create@ros_gz_interfaces/srv/SpawnEntity /world/$(var init_world_name)/remove@ros_gz_interfaces/srv/DeleteEntity /world/$(var init_world_name)/set_pose@ros_gz_interfaces/srv/SetEntityPose"
    if: $(eval "'$(var simulator)' == 'gz'")
