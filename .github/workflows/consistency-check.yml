name: Consistency Check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  robot_radius_drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install lint dependencies
        run: pip install --no-cache-dir pyyaml catkin_pkg

      - name: Check robot_radius drift between WebUI launch and Nav2 yaml
        run: python3 scripts/check_robot_radius_drift.py

      - name: Check sample mapoi_config.yaml consistency
        run: python3 scripts/check_sample_yaml_consistency.py

      - name: Check mapoi_interfaces docs/implementation consistency
        run: python3 scripts/check_docs_consistency.py

      - name: Check release packaging (CHANGELOG.rst parse + LICENSE co-location)
        run: python3 scripts/check_release_packaging.py

  webui_js_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mapoi_webui/tests/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mapoi_webui/tests/web

      - name: Run vitest
        run: npm test
        working-directory: mapoi_webui/tests/web

  webui_e2e:
    # jsdom 不可の Leaflet 直結部 + 全 js 200 配信を headless chromium で smoke (#284)。
    # 配信は ROS 非依存の Python モックサーバ (e2e/server/mock_server.py)。GL/GPU 不要。
    runs-on: ubuntu-latest
    timeout-minutes: 15  # SSE 常時接続 / install のハング保険
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mapoi_webui/tests/web/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci
        working-directory: mapoi_webui/tests/web

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium
        working-directory: mapoi_webui/tests/web

      - name: Run Playwright e2e smoke
        run: npm run test:e2e
        working-directory: mapoi_webui/tests/web

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mapoi_webui/tests/web/playwright-report/
          retention-days: 7
