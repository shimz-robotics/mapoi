name: Consistency Check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  robot_radius_drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pyyaml
        run: pip install --no-cache-dir pyyaml

      - name: Check robot_radius drift between WebUI launch and Nav2 yaml
        run: python3 scripts/check_robot_radius_drift.py

      - name: Check sample mapoi_config.yaml consistency
        run: python3 scripts/check_sample_yaml_consistency.py

  webui_js_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mapoi_webui/tests/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mapoi_webui/tests/web

      - name: Run vitest
        run: npm test
        working-directory: mapoi_webui/tests/web
