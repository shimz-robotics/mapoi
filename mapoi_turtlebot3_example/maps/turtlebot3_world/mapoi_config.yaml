# シナリオ: 機能カタログ demo (#230)。各機能 (waypoint / landmark / pause / custom tag) を
# 1 route ずつ確認できる tutorial 系と、全機能を 1 route で踏む tour_full の集合。
# 自前 robot への流用を意識し、地名・部屋名ではなく機能を示す抽象名で命名する。
# 検証カバレッジ (#146): system tag 単独 / 複合、tolerance.yaw 厳密 ↔ 緩い、route の
# waypoints + landmarks 両方持ち、custom tag。
custom_tags:
- {name: audio_info, description: Audio guide trigger (POI 進入で音声再生)}
route:
# tutorial_01_basic: 基本 navigation demo。waypoint 3 点を順に踏む最小構成。
# pause / landmark / custom tag いずれも持たない POI のみで「POI 名 goal + 順次走行」の
# health check として使う。
- name: tutorial_01_basic
  waypoints: [start, mid_basic, goal]
# tutorial_02_landmark: route.landmarks の概念 demo (#143)。route.landmarks に列挙した
# landmark_listed は route 走行中だけ radius event 監視対象になり EVENT_ENTER が pub される。
# 列挙外の landmark_unlisted は同 map 上の経路半径内に居ても pub されないコントラスト demo。
# 経路 (start → goal の直線) 上に両 landmark の tolerance.xy 円内が来るよう座標を取った。
# また landmark_listed は tour_full の mid_audio → goal 区間にも入るよう半径 0.35 で広めに取る。
- name: tutorial_02_landmark
  waypoints: [start, goal]
  landmarks: [landmark_listed]
# tutorial_03_pause: pause タグ POI の停止 + resume demo (#231)。終点を mid_pause に
# 置き、ENTER → EVENT_PAUSED → 停止 → resume の流れを観察。bridge の launch arg
# auto_resume_timeout_sec で挙動を切替できる: 0.0 (default) = operator が手動で
# mapoi/nav/resume を publish、正値 = N 秒後に bridge が自動 resume。
- name: tutorial_03_pause
  waypoints: [start, mid_pause]
# tutorial_04_event_tag: custom tag + EVENT_ENTER の demo (#88)。終点を mid_audio に
# 置き、audio_info タグ POI で audio_guide_node が EVENT_ENTER を契機に audio guide log を
# 出す動作を確認する。
- name: tutorial_04_event_tag
  waypoints: [start, mid_audio]
# tour_full: 全機能を 1 route で踏む総合 demo。waypoints + landmarks 両方持ち、
# pause / custom tag も経由。tutorial_01〜04 を確認した後の「全部入り」確認用。
- name: tour_full
  waypoints: [start, mid_basic, mid_pause, mid_audio, goal]
  landmarks: [landmark_listed]
map:
- {node_name: /map_server, map_file: turtlebot3_world.yaml}
# mapoi_gazebo_bridge が operator map switch 時に読む。
# ground_plane / sun は共通なので入れ替え不要、world を構成する主モデルのみ swap。
gazebo:
  world_model:
    uri: model://turtlebot3_world
    name: turtlebot3_world
# start は POI list 先頭 (= default initial pose、#149) で、Gazebo robot spawn の
# デフォルト位置 (-2, -0.5) と一致。
# tolerance.xy は Nav2 controller の xy_goal_tolerance (0.25) より大きく取らないと、Nav2 が POI
# tolerance.xy 内に入る前にゴール判定で停止し radius event が発火しない。最小 0.30 (5cm 余裕)。
# tolerance.yaw は >= 0.001 (rad) を指定する (msg spec #138 で 0 / 負値は禁止)。
# default 0.785 (≒ π/4 = 45°)。yaw を問わない通過点は π (≒ 180°) 近辺を指定する。
poi:
- description: 全 route 起点 (POI list 先頭 = default initial pose, Gazebo spawn 位置)
  name: start
  pose: {x: -2.0, y: -0.5, yaw: 0.0}
  tolerance: {xy: 0.50, yaw: 0.785}
  tags: [waypoint]
- description: tutorial_01 / tour_full の南側中継点 (pure waypoint)
  name: mid_basic
  pose: {x: -0.6, y: -0.6, yaw: 0.0}
  tolerance: {xy: 0.35, yaw: 0.785}
  tags: [waypoint]
- description: tutorial_03 / tour_full の pause POI (南東、両 landmark の半径外)
  name: mid_pause
  pose: {x: 1.0, y: -0.3, yaw: 0.0}
  tolerance: {xy: 0.30, yaw: 3.14}
  tags: [waypoint, pause]
- description: tutorial_04 / tour_full の audio_info POI (南、両 landmark の半径外)
  name: mid_audio
  pose: {x: -0.5, y: -0.8, yaw: 0.0}
  tolerance: {xy: 0.40, yaw: 0.785}
  tags: [waypoint, audio_info]
- description: tutorial_01 / 02 / tour_full の終点 (北東、両 landmark の北側、yaw 厳密)
  name: goal
  pose: {x: 0.8, y: 0.6, yaw: 0.0}
  tolerance: {xy: 0.40, yaw: 0.10}
  tags: [waypoint]
# 以下 landmark 群: Nav2 navigation 不可な reference 点 (#85, #143)。
# tutorial_02_landmark / tour_full の landmarks: [...] で route 走行中だけ radius event 監視対象。
# landmark × pause は排他 (#143 validation で reject) なので組み合わせない。
- description: tutorial_02 / tour_full の route.landmarks 列挙対象
  name: landmark_listed
  pose: {x: 0.0, y: 0.2, yaw: 0.0}
  tolerance: {xy: 0.35, yaw: 0.785}
  tags: [landmark]
- description: tutorial_02 のコントラスト (route.landmarks に列挙されないので同 map 上でも pub されない)
  name: landmark_unlisted
  pose: {x: -0.3, y: 0.3, yaw: 0.0}
  tolerance: {xy: 0.30, yaw: 0.785}
  tags: [landmark]
