# PoiEvent 駆動 sample subscriber を起動する launch (#88)。
#
# audio_guide_node: audio_info tag POI で EVENT_ENTER → audio guide log
#
# 使い方:
#   ros2 launch mapoi_turtlebot3_example mapoi_event_samples.launch.yaml
#
# 本 launch は turtlebot3_navigation.launch.yaml から無条件 include される
# (集約 launch は demo 用途のため)。自前 robot に sample subscriber だけ流用したい
# 場合は本 launch を単独で include する。
launch:

- node:
    pkg: mapoi_turtlebot3_example
    exec: audio_guide_node
    name: audio_guide_node
