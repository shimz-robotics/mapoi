launch:

# Arguments
- let: {name: pkg_name, value: "turtlebot3_navigation2"}
- arg:
    name: map
    default: "$(find-pkg-share turtlebot3_navigation2)/map/map.yaml"
    description: "Full path to map file to load"

- arg:
    name: params_file
    default: "$(find-pkg-share mapoi_turtlebot3_example)/param/$(env ROS_DISTRO)/$(env TURTLEBOT3_MODEL).yaml"
    description: "Full path to param file to load"

- arg:
    name: use_sim_time
    default: "true"
    description: "Use simulation clock if true"

- arg:
    name: gui
    default: "true"
    description: "Launch RViz2 GUI (set false for headless)"

- arg:
    name: gazebo_gui
    default: "true"
    description: "Launch Gazebo GUI (gzclient; set false for headless)"

# Gazebo launch (headless-aware wrapper)
- include:
    file: "$(find-pkg-share mapoi_turtlebot3_example)/launch/gazebo_headless_aware.launch.py"
    arg:
      - {name: gazebo_gui, value: "$(var gazebo_gui)"}
      - {name: use_sim_time, value: "$(var use_sim_time)"}


# Include Nav2 bringup
- include:
    file: "$(find-pkg-share nav2_bringup)/launch/bringup_launch.py"
    arg:
      - {name: map, value: "$(var map)"}
      - {name: params_file, value: "$(var params_file)"}
      - {name: use_sim_time, value: "$(var use_sim_time)"}


# RViz2 (skip in headless)
- node:
    pkg: rviz2
    exec: rviz2
    args: "-d $(find-pkg-share mapoi_turtlebot3_example)/rviz/tb3_navigation2.rviz"
    param:
      - {name: use_sim_time, value: "$(var use_sim_time)"}
    output: "screen"
    if: $(var gui)


# Mapoi Server
- node:
    pkg: mapoi_server
    exec: mapoi_server
    param:
      - {name: maps_path, value: "$(find-pkg-share mapoi_turtlebot3_example)/maps"}
      - {name: map_name, value: "turtlebot3_world"}
      - {name: config_file, value: "mapoi_config.yaml"}
      - {name: pub_interval_ms, value: 500}

- node:
    pkg: mapoi_server
    exec: mapoi_nav_server

- node:
    pkg: mapoi_server
    exec: mapoi_rviz2_publisher

# Mapoi Web UI
- node:
    pkg: mapoi_webui
    exec: mapoi_webui_node.py
    param:
      - {name: maps_path, value: "$(find-pkg-share mapoi_turtlebot3_example)/maps"}
      - {name: map_name, value: "turtlebot3_world"}
      - {name: config_file, value: "mapoi_config.yaml"}
      - {name: web_port, value: 8765}
      - {name: web_host, value: "0.0.0.0"}
    output: "screen"
