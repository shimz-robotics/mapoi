launch:

# Arguments
- let: {name: pkg_name, value: "turtlebot3_navigation2"}
- arg:
    name: map
    default: "$(find-pkg-share turtlebot3_navigation2)/map/map.yaml"
    description: "Full path to map file to load"

- arg:
    name: params_file
    default: "$(find-pkg-share mapoi_turtlebot3_example)/param/$(env ROS_DISTRO)/$(env TURTLEBOT3_MODEL).yaml"
    description: "Full path to param file to load"

- arg:
    name: use_sim_time
    default: "true"
    description: "Use simulation clock if true"

- arg:
    name: rviz
    default: "true"
    description: "Launch RViz2 (set false for headless)"

- arg:
    name: gazebo_gui
    default: "true"
    description: "Launch Gazebo GUI (gzclient; set false for headless). gzserver は常時起動"

# Gazebo launch
# - Humble: headless-aware wrapper (gazebo_gui arg で gzclient を条件化可能)
# - Jazzy: 上流 launch を直接 include (headless 未対応、gazebo_gui arg は無視)
- include:
    file: "$(find-pkg-share mapoi_turtlebot3_example)/launch/gazebo_headless_aware.launch.yaml"
    arg:
      - {name: gazebo_gui, value: "$(var gazebo_gui)"}
      - {name: use_sim_time, value: "$(var use_sim_time)"}
    if: $(eval "'$(env ROS_DISTRO)' == 'humble'")

- include:
    file: "$(find-pkg-share turtlebot3_gazebo)/launch/turtlebot3_world.launch.py"
    unless: $(eval "'$(env ROS_DISTRO)' == 'humble'")


# Include Nav2 bringup
- include:
    file: "$(find-pkg-share nav2_bringup)/launch/bringup_launch.py"
    arg:
      - {name: map, value: "$(var map)"}
      - {name: params_file, value: "$(var params_file)"}
      - {name: use_sim_time, value: "$(var use_sim_time)"}


# RViz2 (skip in headless)
- node:
    pkg: rviz2
    exec: rviz2
    args: "-d $(find-pkg-share mapoi_turtlebot3_example)/rviz/tb3_navigation2.rviz"
    param:
      - {name: use_sim_time, value: "$(var use_sim_time)"}
    output: "screen"
    if: $(var rviz)


# mapoi_sim_bridge: SwitchMap 時に Gazebo の障害物 entity を入れ替え + ロボット teleport
# (Gazebo 本体は再起動せず、/clock /tf /odom 等の継続性を保つ)
- node:
    pkg: mapoi_turtlebot3_example
    exec: sim_bridge.py
    output: "screen"
    param:
      - from: "$(find-pkg-share mapoi_turtlebot3_example)/config/sim_bridge.yaml"

# Mapoi core (mapoi_server / mapoi_nav_server / mapoi_rviz2_publisher)
- include:
    file: "$(find-pkg-share mapoi_server)/launch/mapoi_core.launch.yaml"
    arg:
      - {name: maps_path, value: "$(find-pkg-share mapoi_turtlebot3_example)/maps"}
      - {name: map_name, value: "turtlebot3_world"}
      - {name: config_file, value: "mapoi_config.yaml"}
      - {name: pub_interval_ms, value: "500"}

# Mapoi Web UI
- include:
    file: "$(find-pkg-share mapoi_webui)/launch/mapoi_webui.launch.yaml"
    arg:
      - {name: maps_path, value: "$(find-pkg-share mapoi_turtlebot3_example)/maps"}
      - {name: map_name, value: "turtlebot3_world"}
      - {name: config_file, value: "mapoi_config.yaml"}
      - {name: web_port, value: "8765"}
      - {name: web_host, value: "0.0.0.0"}
