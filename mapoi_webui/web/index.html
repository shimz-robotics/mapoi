<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mapoi Web UI</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header>
    <h1>mapoi Web UI</h1>
    <div id="map-selector">
      <label id="map-select-label" for="map-select">Map:</label>
      <select id="map-select"></select>
    </div>
  </header>

  <main>
    <div id="map-container">
      <div id="map"></div>
      <div id="map-status"></div>
      <!-- Cursor 位置の world 座標 readout (#381)。map 上の mousemove 中のみ表示
           (map-viewer.js が更新)。#map-status (左下) と対になる右下配置。 -->
      <div id="cursor-readout" class="hidden"></div>

      <!-- 地図上にフロートする UI 一括表示/非表示トグル (#324)。ui-hidden 時も残る
           ので UI を復帰できる。アイコンは action-based の eye SVG (表示中 = eye-off
           「隠す」、非表示中 = eye「戻す」)。◑/⚙ グリフはダークモード/アプリ設定と
           誤読されるため不採用。overlay / 不透明度の設定はパネル内 Display section
           (#323)。配線は ui-settings.js。 -->
      <div id="ui-controls">
        <!-- 選択中 POI の位置編集 (drag + yaw ハンドル) を明示的にロック/アンロックする
             (#333)。位置編集はロボット運用の主作業 (ナビゲーション/監視) に対して「たまに
             行う設定変更」なので、既定はロック (安全側)。ページ再読み込みで再度ロックに
             戻り、解除状態は永続化しない。対象は選択→即ドラッグできてしまう経路のみ。
             Add POI 配置クリックや Route waypoint 追加は事前に明示ボタン操作が要るため
             対象外 (誤操作リスクが無い)。配線は app.js、実体制御は
             MapViewer.setPoiDraggingAllowed (route 編集中の抑止と AND)。 -->
        <button id="btn-poi-lock-toggle" type="button" class="ui-control-btn"
                aria-pressed="true" title="Unlock POI position editing" aria-label="Toggle POI position lock">
          <svg id="poi-lock-icon-locked" class="ui-control-icon-svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <svg id="poi-lock-icon-unlocked" class="ui-control-icon-svg hidden" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
          </svg>
        </button>
        <!-- POI ドラッグの誤操作をパネルを開かずに取り消せるよう、undo 履歴がある間だけ
             出現するフローティング Undo (#332)。パネルの開閉状態と無関係に地図上で
             marker を選択・ドラッグできるため、モバイルで #poi-body が畳まれていても
             即座に取り消せる場所に置く。POI 専用 (route の drag はフォームを開いている
             時にしか発生せず、その時点でパネルは既に展開済みなので同じ問題が無い)。 -->
        <button id="btn-poi-undo-float" type="button" class="ui-control-btn hidden"
                title="Undo POI edit (Ctrl+Z)" aria-label="Undo last POI edit">
          <span class="ui-control-glyph" aria-hidden="true">&#8630;</span>
        </button>
        <button id="btn-ui-toggle" type="button" class="ui-control-btn"
                aria-pressed="false" title="Hide UI" aria-label="Toggle UI visibility">
          <svg id="ui-toggle-icon-hide" class="ui-control-icon-svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
          <svg id="ui-toggle-icon-show" class="ui-control-icon-svg hidden" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="sidebar-resizer" role="separator" aria-orientation="vertical" title="Drag to resize sidebar"></div>

    <div id="poi-panel">
      <div id="nav-section" class="panel-section">
        <div class="section-header">
          <span>Navigation</span>
          <div class="section-header-actions">
            <button id="btn-nav-toggle" class="btn-section-toggle" title="Toggle">&#9660;</button>
          </div>
        </div>
        <div id="nav-body" class="nav-body">
          <div class="nav-status">
            <span id="nav-status-dot" class="nav-status-dot nav-status-idle"></span>
            <span id="nav-status-text">Idle</span>
          </div>
          <div id="navigation-availability" class="navigation-availability navigation-unknown">
            <span id="navigation-availability-dot" class="navigation-availability-dot"></span>
            <span id="navigation-availability-text">Checking navigation</span>
          </div>
          <div id="localization-availability" class="navigation-availability navigation-unknown">
            <span id="localization-availability-dot" class="navigation-availability-dot"></span>
            <span id="localization-availability-text">Checking localization</span>
          </div>
          <div id="navigation-warning" class="navigation-warning hidden"></div>
          <div id="navigation-map-switch" class="navigation-map-switch">
            <label for="navigation-map-select">Robot Map</label>
            <div class="nav-control-row">
              <select id="navigation-map-select" class="nav-select">
                <option value="">-- Select Map --</option>
              </select>
            </div>
          </div>
          <div class="nav-control-group">
            <div class="nav-control-row">
              <select id="nav-goal-select" class="nav-select">
                <option value="">-- Select POI --</option>
              </select>
              <button id="btn-nav-go" class="nav-btn-go">Go</button>
            </div>
            <div class="nav-control-row">
              <select id="nav-route-select" class="nav-select">
                <option value="">-- Select Route --</option>
              </select>
              <button id="btn-nav-run" class="nav-btn-run">Run</button>
            </div>
          </div>
          <div class="nav-pause-resume-row">
            <button id="btn-nav-pause" class="nav-btn-pause">Pause</button>
            <button id="btn-nav-resume" class="nav-btn-resume">Resume</button>
          </div>
          <button id="btn-nav-stop" class="nav-btn-stop">Stop Navigation</button>
          <div class="nav-control-label">Initial Pose</div>
          <div class="nav-control-row">
            <select id="nav-initialpose-select" class="nav-select">
              <option value="">-- Select POI --</option>
            </select>
            <button id="btn-nav-setpose" class="nav-btn-initialpose">Set Pose</button>
          </div>
        </div>
      </div>

      <div id="tag-section" class="panel-section">
        <div class="section-header">
          <span>Tags</span>
          <div class="section-header-actions">
            <button id="btn-tag-toggle" class="btn-section-toggle" title="Toggle">&#9660;</button>
          </div>
        </div>
        <div id="tag-body">
          <div id="tag-list" class="section-body"></div>
          <div id="tag-add-form" class="tag-add-form">
            <input type="text" id="tag-add-name" placeholder="Tag name" />
            <input type="text" id="tag-add-desc" placeholder="Description" />
            <button id="btn-tag-add">+ Add</button>
          </div>
          <div id="tag-toolbar">
            <button id="btn-save-tags" title="Save tag changes (Ctrl+S)" disabled>Save</button>
            <button id="btn-discard-tags" title="Discard tag changes" disabled>Discard</button>
            <span id="tag-dirty-indicator"></span>
          </div>
        </div>
      </div>

      <div id="poi-section" class="panel-section">
        <div class="section-header">
          <span>POIs</span>
          <div class="section-header-actions">
            <button id="btn-poi-all" class="btn-check-all" title="Check all">All</button>
            <button id="btn-poi-none" class="btn-check-all" title="Uncheck all">None</button>
            <button id="btn-poi-toggle" class="btn-section-toggle" title="Toggle">&#9660;</button>
          </div>
        </div>
        <div id="poi-body">
          <div id="poi-list" class="section-body"></div>
          <div id="poi-edit-form" class="hidden">
            <h3 id="form-title">Edit POI</h3>
            <div class="form-row">
              <label for="poi-name">Name</label>
              <input type="text" id="poi-name" />
            </div>
            <div class="form-row">
              <label for="poi-x">X</label>
              <input type="number" id="poi-x" step="0.01" />
            </div>
            <div class="form-row">
              <label for="poi-y">Y</label>
              <input type="number" id="poi-y" step="0.01" />
            </div>
            <div class="form-row">
              <label for="poi-yaw">Yaw</label>
              <input type="number" id="poi-yaw" step="0.01" />
            </div>
            <div class="form-row">
              <label for="poi-tolerance-xy">Tolerance.xy (m)</label>
              <input type="number" id="poi-tolerance-xy" step="0.05" min="0.001" />
            </div>
            <div class="form-row">
              <!-- UI は度 (deg) で入力、内部 / yaml は rad で保存 (#138)。min 0.06° ≒ 0.001 rad で
                   yaml load の min check と整合。 -->
              <label for="poi-tolerance-yaw">Tolerance.yaw (deg)</label>
              <input type="number" id="poi-tolerance-yaw" step="1" min="0.06" />
            </div>
            <div class="form-row">
              <label for="poi-tags">Tags</label>
              <input type="text" id="poi-tags" placeholder="waypoint, event" />
            </div>
            <div class="form-row">
              <label for="poi-description">Description</label>
              <input type="text" id="poi-description" />
            </div>
            <div class="form-actions">
              <button id="btn-form-ok">OK</button>
              <button id="btn-form-cancel">Cancel</button>
            </div>
          </div>
          <div id="poi-toolbar" class="editor-toolbar">
            <button id="btn-add-poi" class="toolbar-primary" title="Add POI">+ Add POI</button>
            <span class="toolbar-command-group">
              <button id="btn-save" title="Save changes (Ctrl+S)" disabled>Save</button>
              <button id="btn-discard" title="Discard changes" disabled>Discard</button>
            </span>
            <span class="toolbar-command-group toolbar-history-group" aria-label="POI history">
              <button id="btn-undo" class="btn-icon-command" title="Undo (Ctrl+Z)" aria-label="Undo POI edit" disabled>&#8630;</button>
              <button id="btn-redo" class="btn-icon-command" title="Redo (Ctrl+Shift+Z)" aria-label="Redo POI edit" disabled>&#8631;</button>
            </span>
            <span id="dirty-indicator"></span>
          </div>
        </div>
      </div>

      <div id="route-section" class="panel-section">
        <div class="section-header">
          <span>Routes</span>
          <div class="section-header-actions">
            <button id="btn-route-all" class="btn-check-all" title="Check all">All</button>
            <button id="btn-route-none" class="btn-check-all" title="Uncheck all">None</button>
            <button id="btn-route-toggle" class="btn-section-toggle" title="Toggle">&#9660;</button>
          </div>
        </div>
        <div id="route-body">
          <div id="route-list" class="section-body"></div>
          <div id="route-edit-form" class="hidden">
            <h3 id="route-form-title">Edit Route</h3>
            <div class="form-row">
              <label for="route-name">Name</label>
              <input type="text" id="route-name" />
            </div>
            <div class="route-wp-section">
              <label>Waypoints</label>
              <div id="route-waypoint-list" class="route-waypoint-list"></div>
              <div class="route-wp-add-row">
                <select id="route-wp-select" class="route-wp-select">
                  <option value="">-- Select POI --</option>
                </select>
                <button type="button" id="btn-add-waypoint" class="btn-add-wp">+</button>
              </div>
              <label class="route-map-insert-toggle" title="Map clicks insert after the selected waypoint">
                <input
                  type="checkbox"
                  id="route-map-insert-toggle"
                  aria-label="Insert map-clicked POIs after the selected waypoint"
                />
                <span>Map click inserts after selected</span>
              </label>
            </div>
            <!-- route.landmarks (#143): この route 走行中に意識する補助 POI 群 (Nav2 へは送らず radius 監視のみ) -->
            <div class="route-wp-section">
              <label>Landmarks (optional)</label>
              <div id="route-landmark-list" class="route-waypoint-list"></div>
              <div class="route-wp-add-row">
                <select id="route-lm-select" class="route-wp-select">
                  <option value="">-- Select landmark POI --</option>
                </select>
                <button type="button" id="btn-add-landmark" class="btn-add-wp">+</button>
              </div>
              <div class="route-wp-map-hint">Landmark POIs are watched by radius. They are not sent to Nav2.</div>
            </div>
            <div class="form-actions">
              <button id="btn-route-form-ok">OK</button>
              <button id="btn-route-form-cancel">Cancel</button>
            </div>
          </div>
          <div id="route-toolbar" class="editor-toolbar">
            <button id="btn-add-route" class="toolbar-primary" title="Add Route">+ Add Route</button>
            <span class="toolbar-command-group">
              <button id="btn-save-routes" title="Save route changes (Ctrl+S)" disabled>Save</button>
              <button id="btn-discard-routes" title="Discard route changes" disabled>Discard</button>
            </span>
            <span class="toolbar-command-group toolbar-history-group" aria-label="Route history">
              <button id="btn-route-undo" class="btn-icon-command" title="Undo route edit (Ctrl+Z)" aria-label="Undo route edit" disabled>&#8630;</button>
              <button id="btn-route-redo" class="btn-icon-command" title="Redo route edit (Ctrl+Shift+Z)" aria-label="Redo route edit" disabled>&#8631;</button>
            </span>
            <span id="route-dirty-indicator"></span>
          </div>
        </div>
      </div>

      <!-- Display section (#323 / #324): overlay / 不透明度の表示設定。UI が見えている
           時にしか意味がないため地図上のフローティングでなくパネル内に置く。既定折畳。
           開閉・配線は ui-settings.js (app.js setupSectionToggle とは独立、glyph は同じ)。 -->
      <div id="display-section" class="panel-section">
        <div class="section-header">
          <span>Display</span>
          <div class="section-header-actions">
            <button id="btn-display-toggle" class="btn-section-toggle" title="Toggle">&#9654;</button>
          </div>
        </div>
        <div id="display-body" class="display-body" style="display: none;">
          <label class="display-check">
            <input type="checkbox" id="ui-overlay-toggle" />
            <span>Overlay on map</span>
          </label>
          <div class="display-row">
            <label for="ui-alpha-slider">UI opacity</label>
            <div class="ui-alpha-row">
              <input type="range" id="ui-alpha-slider" min="30" max="100" step="5" value="100"
                     aria-label="UI opacity (%)" />
              <span id="ui-alpha-value" class="ui-alpha-value">100%</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/api.js"></script>
  <!-- geometry.js は MapoiGeometry を window に attach する pure helper 群。
       map-viewer.js より前に読み込む必要がある (showRoutes 経由で参照される) -->
  <script src="/js/geometry.js"></script>
  <!-- poi-filter.js は MapoiPoiFilter を window に attach する pure helper 群 (#85)。
       app.js より前に読み込む。 -->
  <script src="/js/poi-filter.js"></script>
  <!-- poi-interactions.js は MapoiPoiInteractions を window に attach する pure helper 群 (#273)。
       map-viewer.js より前に読み込む (クリック判別 / wedge 幾何 / 座標変換で参照される)。 -->
  <script src="/js/poi-interactions.js"></script>
  <!-- poi-history.js は MapoiPoiHistory を window に attach する pure helper 群 (#300)。
       poi-editor.js より前に読み込む (Undo/Redo の stack 操作で参照される)。 -->
  <script src="/js/poi-history.js"></script>
  <!-- map-icons.js は MapoiMapIcons を window に attach するマーカー/アイコン生成ヘルパー (#346)。
       map-viewer.js より前に読み込む (POI/ロボット/route アイコン生成で参照される)。 -->
  <script src="/js/map-icons.js"></script>
  <!-- map-viewer-sector.js は MapViewerSector クラス (POI 扇形描画 + yaw 回転ハンドル、#346)。
       map-viewer.js より前に読み込む (MapViewer コンストラクタが new する)。 -->
  <script src="/js/map-viewer-sector.js"></script>
  <script src="/js/map-viewer.js"></script>
  <script src="/js/poi-editor.js"></script>
  <script src="/js/route-editor.js"></script>
  <script src="/js/sidebar-resizer.js"></script>
  <!-- ui-settings.js は #ui-controls を配線し UI オン/オフトグル (#324) と
       半透明化 (#323) を localStorage 永続で提供する pure/DOM helper。他モジュール非依存。 -->
  <script src="/js/ui-settings.js"></script>
  <!-- nav-controls.js は MapoiNavControls を window に attach する pure/DOM helper 群 (#199)。
       app.js より前に読み込む (updateNavControlsAvailability / map switch / 初期 section で参照)。 -->
  <script src="/js/nav-controls.js"></script>
  <!-- toast.js は MapoiToast を window に attach する auto-dismiss 通知 helper (#354)。
       app.js の SSE ハンドラより前に読み込む。 -->
  <script src="/js/toast.js"></script>
  <!-- reload-guard.js は MapoiReloadGuard を window に attach する pure helper 群 (#373)。
       app.js の SSE ハンドラより前に読み込む (config_changed reload の dirty guard 判定)。 -->
  <script src="/js/reload-guard.js"></script>
  <!-- tag-editor.js は TagEditor クラス (タグ定義エディタ、#346)。app.js が `new TagEditor()` する
       ため、app.js より前に読み込む。 -->
  <script src="/js/tag-editor.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
